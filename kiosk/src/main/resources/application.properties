# =========================================================
# 1. Server Configuration
# =========================================================
spring.application.name=kiosk
server.port=8888

# =========================================================
# 2. MySQL / DataSource Configuration
# =========================================================
# localhost:3306은 도커 컨테이너를 가리킵니다.
spring.datasource.url=jdbc:mysql://172.16.15.97:3308/kiosk?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=user
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# 3. JPA (Hibernate) Configuration
# =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================================================
# 4. MyBatis Configuration
# =========================================================
# XML 매퍼 위치 (resources/mapper 폴더 아래 모든 xml)
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# =========================================================
# 5. File Upload & Logging
# =========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

logging.level.com.kiosk=debug
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# =========================================================
# 6. HikariCP (Connection Pool) - 안정성 설정
# =========================================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10




spring.jpa.properties.hibernate.default_batch_fetch_size=100


