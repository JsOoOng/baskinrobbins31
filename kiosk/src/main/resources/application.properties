# =========================================================
# 1. Server Configuration
# =========================================================
spring.application.name=kiosk
server.port=8889
server.printPort=8888

# =========================================================
# 2. MySQL / DataSource Configuration
# =========================================================
# 강사님께서 만들어주신 도커 SERVER
spring.datasource.url=jdbc:mysql://172.16.15.97:3308/kiosk?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=user
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# 3. JPA (Hibernate) Configuration
# =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================================================
# 4. MyBatis Configuration
# =========================================================
# XML ë§¤í¼ ìì¹ (resources/mapper í´ë ìë ëª¨ë  xml)
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# =========================================================
# 5. File Upload & Logging
# =========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

logging.level.com.kiosk=debug
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

