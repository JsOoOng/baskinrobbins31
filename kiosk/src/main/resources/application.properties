# =========================================================
# 1. Server Configuration
# =========================================================
spring.application.name=kiosk
server.port=8889
server.printPort=8888

# =========================================================
# 2. MySQL / DataSource Configuration
# =========================================================
spring.datasource.url=jdbc:mysql://172.16.15.83/kiosk?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# 3. JPA (Hibernate) Configuration
# =========================================================
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================================================
# 4. MyBatis Configuration
# =========================================================
# XML Ã«Â§Â¤Ã­ÂÂ¼ Ã¬ÂÂÃ¬Â¹Â (resources/mapper Ã­ÂÂ´Ã«ÂÂ Ã¬ÂÂÃ«ÂÂ Ã«ÂªÂ¨Ã«ÂÂ  xml)
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# =========================================================
# 5. File Upload & Logging
# =========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

logging.level.com.kiosk=debug
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# =========================================================
# 6. HikariCP (Connection Pool) - Ã¬ÂÂÃ¬Â ÂÃ¬ÂÂ± Ã¬ÂÂ¤Ã¬Â Â
# =========================================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.properties.hibernate.default_batch_fetch_size=100

# =========================================================
# 7. Toss Payments API Keys
# =========================================================
toss.secret-key=test_sk_PBal2vxj811glNODl9dk85RQgOAN

# =========================================================
# 8. Data Initialization (SQL 자동 실행)
# =========================================================
# 반드시 JPA가 테이블을 모두 생성한 이후에 SQL 스크립트가 실행되도록 순서 연기
spring.jpa.defer-datasource-initialization=true

# 서버 시작 시 항상 SQL 파일을 실행하도록 설정
#spring.sql.init.mode=always
spring.sql.init.mode=never

# 실행할 SQL 파일의 경로 지정 (classpath 기준으로 src/main/resources 안의 파일을 찾음)
spring.sql.init.data-locations=classpath:init_data.sql