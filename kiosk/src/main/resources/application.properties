# =========================================================
# 1. 서버 설정
# =========================================================
spring.application.name=kiosk

# Spring Boot 웹 서버 포트
server.port=8889

# 영수증 출력 서버에서 사용하는 사용자 정의 포트
server.printPort=7777


# =========================================================
# 2. MySQL 데이터베이스 연결 설정
# =========================================================
# Spring Boot와 MySQL Docker 컨테이너를 같은 PC에서 실행하는 경우 (집 용)
# spring.datasource.url=jdbc:mysql://localhost:3306/kiosk?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true
# 학교에서 실행하는 경우
spring.datasource.url=jdbc:mysql://172.16.15.97:3308/kiosk?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=user
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# =========================================================
# 3. JPA 및 Hibernate 설정
# =========================================================
# 기존 테이블은 유지하면서 엔티티 변경사항을 반영
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.hibernate.ddl-auto=create (더미데이터 첫 사용 용도)
# 애플리케이션 실행 시 테이블을 새로 생성하려면 아래 설정을 사용
# 주의: 기존 테이블과 데이터가 삭제될 수 있음
# spring.jpa.hibernate.ddl-auto=create

# 실행되는 SQL을 콘솔에 출력
spring.jpa.show-sql=true

# SQL을 보기 좋게 정렬하여 출력
spring.jpa.properties.hibernate.format_sql=true

# MySQL용 Hibernate 방언 설정
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 연관관계 데이터를 조회할 때 한 번에 가져올 기본 개수
spring.jpa.properties.hibernate.default_batch_fetch_size=100


# =========================================================
# 4. MyBatis 설정
# =========================================================
# resources/mapper 폴더 아래의 모든 XML 매퍼 파일을 검색
mybatis.mapper-locations=classpath:mapper/**/*.xml

# 데이터베이스의 snake_case 컬럼명을 Java의 camelCase 필드명으로 자동 변환
# 예: store_id -> storeId
mybatis.configuration.map-underscore-to-camel-case=true


# =========================================================
# 5. 파일 업로드 및 로그 설정
# =========================================================
# 파일 하나의 최대 업로드 크기
spring.servlet.multipart.max-file-size=10MB

# 한 번의 요청에서 업로드할 수 있는 전체 파일 크기
spring.servlet.multipart.max-request-size=20MB

# 프로젝트 패키지 로그 레벨
logging.level.com.kiosk=debug

# Hibernate가 실행하는 SQL 출력
logging.level.org.hibernate.SQL=debug

# SQL의 물음표 자리에 들어가는 실제 파라미터 값 출력
logging.level.org.hibernate.orm.jdbc.bind=trace


# =========================================================
# 6. HikariCP 데이터베이스 커넥션 풀 설정
# =========================================================
# 데이터베이스 연결을 기다리는 최대 시간
# 단위: 밀리초, 30000 = 30초
spring.datasource.hikari.connection-timeout=30000

# 데이터베이스에 동시에 연결할 수 있는 최대 커넥션 수
spring.datasource.hikari.maximum-pool-size=10


# =========================================================
# 7. Toss Payments API 키
# =========================================================
# 실제 키를 GitHub에 올리지 않도록 환경변수 사용을 권장
toss.secret-key=test_sk_PBal2vxj811glNODl9dk85RQgOAN


# =========================================================
# 8. 초기 데이터 SQL 실행 설정
# =========================================================
# JPA가 테이블을 생성하거나 수정한 다음 SQL 초기화 파일을 실행
spring.jpa.defer-datasource-initialization=true

# 서버를 실행할 때 init_data.sql을 실행하지 않음
spring.sql.init.mode=never
# 초기 데이터를 다시 넣어야 할 때만 아래 설정으로 변경
# spring.sql.init.mode=always (더미데이터 첫 사용 용도)

# 실행할 SQL 파일의 위치
# src/main/resources/init_data.sql
spring.sql.init.data-locations=classpath:init_data.sql

# SQL 파일 문자 인코딩
spring.sql.init.encoding=UTF-8
